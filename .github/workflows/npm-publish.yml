name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type (patch|minor|major)
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      cu_id:
        description: ClickUp task ID (e.g. CU-abc123)
        required: true
        type: string

permissions:
  contents: write
  id-token: write # Required for npm trusted publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git author
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Ensure branch allowed
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" != "main" ] && [ "$BRANCH" != "development" ]; then
            echo "Releases only allowed from main or development. Current: $BRANCH" >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install deps
        run: npm ci

      - name: Verify (ci)
        run: npm run verify:ci

      - name: prepublish check
        run: |
          npm run prepub
          npm run pack:check

      - name: Run release bump
        env:
          CU_ID: ${{ inputs.cu_id }}
          HUSKY: 0
        run: |
          echo "Running bump: ${{ inputs.bump }} with CU_ID=${{ inputs.cu_id }}"
          if [ "${{ inputs.bump }}" = "patch" ]; then
            npm run version:next
          elif [ "${{ inputs.bump }}" = "minor" ]; then
            npm run release:minor
          else
            npm run release:major
          fi

      - name: Validate changelog for bumped version
        run: node ./scripts/check-changelog.mjs

      - name: Extract version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Derive notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          FILE=CHANGELOG.md
          if [ ! -f "$FILE" ]; then
            echo "CHANGELOG missing" >&2
            exit 1
          fi
          awk -v ver="## [${{ steps.get_version.outputs.version }}]" 'BEGIN{found=0}
            $0 ~ ver {found=1; print; next}
            /^## \[/ && found==1 {exit}
            found==1 {print}' "$FILE" > RELEASE_NOTES.md || true
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Fallback to recent conventional-changelog fragment"
            npx conventional-changelog -p conventionalcommits -r 2 > RELEASE_NOTES.md
          fi
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Changelog generation fallback" > RELEASE_NOTES.md
          fi
          echo 'notes<<EOF' >> "$GITHUB_OUTPUT"
          cat RELEASE_NOTES.md >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Ensure tag points to latest release commit
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          git tag -d "v${VERSION}" 2>/dev/null || true
          git tag "v${VERSION}"

      - name: Push commit and tags
        env:
          HUSKY: 0
        run: |
          git push origin HEAD:${GITHUB_REF_NAME}
          git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          set -euo pipefail
          npm publish --access public
